document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ght:800;font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted,#6f6d64)\">Beobachtungen &amp; Empfehlungen<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:11px;margin-bottom:26px\">\n      <div style=\"display:flex;flex-wrap:wrap;gap:9px;align-items:center\">\n        <span style=\"font-size:12.5px;font-weight:600;color:var(--muted,#6f6d64);margin-right:3px;min-width:96px\">Beobachtungen<\u002Fspan>\n        <sc-for list=\"{{ annObs }}\" as=\"a\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ a.toggle }}\" style=\"{{ a.style }}\">\n            <span style=\"{{ a.dotStyle }}\"><\u002Fspan>\n            <span>{{ a.label }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:9px;align-items:center\">\n        <span style=\"font-size:12.5px;font-weight:600;color:var(--muted,#6f6d64);margin-right:3px;min-width:96px\">Empfehlungen<\u002Fspan>\n        <sc-for list=\"{{ annRec }}\" as=\"a\" hint-placeholder-count=\"2\">\n          <div onclick=\"{{ a.toggle }}\" style=\"{{ a.style }}\">\n            <span style=\"{{ a.dotStyle }}\"><\u002Fspan>\n            <span>{{ a.label }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ hasSel }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"overflow-x:auto;margin-bottom:22px\">\n        <sc-for list=\"{{ tableRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n              <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;background:var(--surface,#fff);border:1px solid var(--border,rgba(20,18,12,.13));border-radius:16px;overflow:hidden;font-size:14px;box-shadow:var(--shadow,0 10px 30px rgba(0,0,0,.05))\">\n          <thead>\n            <tr>\n              <th style=\"padding:13px 16px;text-align:left;font-family:'Archivo',sans-serif;font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted,#6f6d64);border-bottom:1.5px solid var(--border,rgba(20,18,12,.13))\">Tag<\u002Fth>\n              <th style=\"padding:13px 16px;text-align:right;font-family:'Archivo',sans-serif;font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted,#6f6d64);border-bottom:1.5px solid var(--border,rgba(20,18,12,.13))\">Distanz<\u002Fth>\n              <th style=\"padding:13px 16px;text-align:right;font-family:'Archivo',sans-serif;font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted,#6f6d64);border-bottom:1.5px solid var(--border,rgba(20,18,12,.13))\">Anstieg<\u002Fth>\n              <th style=\"padding:13px 16px;text-align:right;font-family:'Archivo',sans-serif;font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted,#6f6d64);border-bottom:1.5px solid var(--border,rgba(20,18,12,.13))\">Höhe min/max<\u002Fth>\n              <th style=\"padding:13px 16px;text-align:right;font-family:'Archivo',sans-serif;font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted,#6f6d64);border-bottom:1.5px solid var(--border,rgba(20,18,12,.13))\">Max °C<\u002Fth>\n              <th style=\"padding:13px 16px;text-align:right;font-family:'Archivo',sans-serif;font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted,#6f6d64);border-bottom:1.5px solid var(--border,rgba(20,18,12,.13))\">Regen<\u002Fth>\n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr>\n                <td style=\"padding:12px 16px;text-align:left;border-bottom:1px solid var(--border,rgba(20,18,12,.13))\"><span style=\"display:flex;align-items:center;gap:9px;font-weight:600\"><span style=\"{{ r.dotStyle }}\"><\u002Fspan>{{ r.label }}<\u002Fspan><\u002Ftd>\n                <td style=\"padding:12px 16px;text-align:right;border-bottom:1px solid var(--border,rgba(20,18,12,.13));font-variant-numeric:tabular-nums\">{{ r.dist }}<\u002Ftd>\n                <td style=\"padding:12px 16px;text-align:right;border-bottom:1px solid var(--border,rgba(20,18,12,.13));font-variant-numeric:tabular-nums\">{{ r.gain }}<\u002Ftd>\n                <td style=\"padding:12px 16px;text-align:right;border-bottom:1px solid var(--border,rgba(20,18,12,.13));font-variant-numeric:tabular-nums\">{{ r.hrange }}<\u002Ftd>\n                <td style=\"padding:12px 16px;text-align:right;border-bottom:1px solid var(--border,rgba(20,18,12,.13));font-variant-numeric:tabular-nums\">{{ r.tmax }}<\u002Ftd>\n                <td style=\"padding:12px 16px;text-align:right;border-bottom:1px solid var(--border,rgba(20,18,12,.13));font-variant-numeric:tabular-nums\">{{ r.rain }}<\u002Ftd>\n              <\u002Ftr>\n            \n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ noSel }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:22px;text-align:center;color:var(--muted,#6f6d64);font-size:14px;background:var(--surface,#fff);border:1px dashed var(--border,rgba(20,18,12,.13));border-radius:16px;margin-bottom:22px\">Kein Tag ausgewählt — wähle oben einen oder mehrere Tage.<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div ref=\"{{ setMapEl }}\" style=\"width:100%;height:min(72vh,560px);border-radius:18px;border:1px solid var(--border,rgba(20,18,12,.13));overflow:hidden;margin-bottom:20px;position:relative;z-index:0;box-shadow:var(--shadow,0 10px 30px rgba(0,0,0,.05))\"><\u002Fdiv>\n\n    <div style=\"background:var(--surface,#fff);border:1px solid var(--border,rgba(20,18,12,.13));border-radius:18px;padding:20px 20px 14px;box-shadow:var(--shadow,0 10px 30px rgba(0,0,0,.05))\">\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:16px;letter-spacing:-.01em;margin:0 0 4px\">Höhenprofil<\u002Fh2>\n      <p style=\"font-size:12.5px;color:var(--muted,#6f6d64);margin:0 0 14px\">Höhe über Distanz · fahre über eine Linie für die Kartenposition · aktive Layer werden hier als Zonen/Linien gespiegelt<\u002Fp>\n      <div style=\"position:relative;height:280px\">\n        <canvas ref=\"{{ setCanvasEl }}\"><\u002Fcanvas>\n      <\u002Fdiv>\n      <sc-if value=\"{{ noSel }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"color:var(--muted,#6f6d64);font-size:14px;padding:26px;text-align:center\">Keinen Tag ausgewählt.<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ hasActive }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:22px;background:var(--surface,#fff);border:1px solid var(--border,rgba(20,18,12,.13));border-radius:16px;padding:16px 18px;box-shadow:var(--shadow,0 10px 30px rgba(0,0,0,.05))\">\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted,#6f6d64);margin-bottom:11px\">Aktive Layer<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px\">\n          <sc-for list=\"{{ activeLayers }}\" as=\"L\" hint-placeholder-count=\"1\">\n            <div style=\"display:flex;align-items:flex-start;gap:10px;font-size:13px\">\n              <span style=\"{{ L.dotStyle }}\"><\u002Fspan>\n              <span><strong style=\"font-weight:700\">{{ L.label }}<\u002Fstrong> — <span style=\"color:var(--muted,#6f6d64)\">{{ L.desc }}<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <p style=\"color:var(--muted,#6f6d64);font-size:12px;margin-top:24px;line-height:1.65\">\n      Datengrundlage: Garmin-Track (TCX), normalisiert auf einheitliche Tagesstrecke. Höhenwerte aus dem GPS-Barometer (±einige Meter).\n      Beobachtungen/Hinweise abgeleitet aus der Tempo-, Herzfrequenz- und Wetteranalyse (Einbruch &amp; Hitze: Tag 3 &amp; 4).\n      *Niederschlag Tag 2: 5,8 mm ist der Tageswert der KNMI-Station Volkel (25 km südlich), mit Schwerpunkt früh morgens. Wetterberichte vom 16.07. und die Beobachtung vor Ort belegen am späten Vormittag/Mittag mehrere kurze, kräftige Schauer über der Strecke; solche lokalen Konvektionszellen erfasst eine 25 km entfernte Station nur unvollständig, der reale Streckenniederschlag dürfte höher gelegen haben.\n      Kartenmaterial © OpenStreetMap-Mitwirkende. Temperatur: KNMI-Station Volkel.\n    <\u002Fp>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    let theme='light';\n    try{ const t=localStorage.getItem('vierdaagse-theme'); if(t==='dark'||t==='light') theme=t; }catch(e){}\n    this.state={ theme, days:{}, anns:{} };\n    this._mapEl=null; this._canvasEl=null;\n    this.map=null; this.chart=null; this.layers=[]; this.posM=null; this._prevDays='';\n    this.setMapEl=el=>{ this._mapEl=el; };\n    this.setCanvasEl=el=>{ this._canvasEl=el; };\n  }\n\n  componentDidMount(){\n    this._poll=setInterval(()=>{\n      if(window.L && window.Chart && window.VIERDAAGSE){\n        clearInterval(this._poll);\n        const {order}=window.VIERDAAGSE;\n        const days={}; order.forEach(k=>days[k]=true);\n        this.setState({days,anns:{collapse:true}}, ()=>{ this.initMap(); this.redraw(true); });\n      }\n    },60);\n  }\n  componentWillUnmount(){ if(this._poll) clearInterval(this._poll); }\n\n  componentDidUpdate(){\n    if(!this.map) return;\n    const cur=JSON.stringify(this.state.days);\n    const daysChanged = cur!==this._prevDays;\n    this._prevDays=cur;\n    this.redraw(daysChanged);\n  }\n\n  initMap(){\n    if(this.map || !this._mapEl) return;\n    this.map=L.map(this._mapEl,{scrollWheelZoom:true});\n    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(this.map);\n    setTimeout(()=>{ if(this.map) this.map.invalidateSize(); },280);\n  }\n\n  idxForKm(d,km){ const e=window.VIERDAAGSE.DATA[d].elev; let best=0,bd=1e9;\n    for(let i=0;i<e.length;i++){ const diff=Math.abs(e[i][0]-km); if(diff<bd){bd=diff;best=i;} } return best; }\n\n  toggleDay(d){ this.setState(s=>({days:{...s.days,[d]:!s.days[d]}})); }\n  toggleAnn(id){ this.setState(s=>({anns:{...s.anns,[id]:!s.anns[id]}})); }\n  selAll(){ const {order}=window.VIERDAAGSE; const days={}; order.forEach(k=>days[k]=true); this.setState({days}); }\n  selNone(){ this.setState({days:{}}); }\n\n  redraw(refit){\n    if(!this.map) return;\n    this.drawRoutes(refit);\n    this.drawElev();\n    const dark=this.state.theme==='dark';\n    const pane=this.map.getPane('tilePane');\n    if(pane) pane.style.filter = dark ? 'invert(1) hue-rotate(180deg) brightness(.9) contrast(.88) grayscale(.12)' : '';\n  }\n\n  drawRoutes(refit){\n    const {DATA,COLORS,HEAT,order,ANNOT}=window.VIERDAAGSE;\n    this.layers.forEach(l=>this.map.removeLayer(l)); this.layers=[];\n    if(this.posM){ this.map.removeLayer(this.posM); this.posM=null; }\n    const sel=order.filter(d=>this.state.days[d]); if(!sel.length) return;\n    let bounds=null;\n    sel.forEach(d=>{ const v=DATA[d],c=COLORS[d];\n      const line=L.polyline(v.route,{color:c,weight:4,opacity:.85}).addTo(this.map); this.layers.push(line);\n      this.layers.push(L.circleMarker(v.start,{radius:6,color:'#fff',weight:2,fillColor:c,fillOpacity:1}).addTo(this.map).bindPopup('Start · '+v.label));\n      this.layers.push(L.circleMarker(v.end,{radius:6,color:'#fff',weight:2,fillColor:'#2c2c2a',fillOpacity:1}).addTo(this.map).bindPopup('Ziel · '+v.label));\n      bounds=bounds?bounds.extend(line.getBounds()):line.getBounds(); });\n    ANNOT.filter(a=>this.state.anns[a.id]).forEach(a=>{\n      if(a.kind==='range'){\n        sel.forEach(d=>{ const i0=this.idxForKm(d,a.from),i1=this.idxForKm(d,a.to);\n          const seg=DATA[d].route.slice(i0,i1+1);\n          if(seg.length>1) this.layers.push(L.polyline(seg,{color:a.color,weight:9,opacity:.5}).addTo(this.map).bindPopup('<b>'+a.label+'<\u002Fb><br>'+a.desc)); });\n      } else if(a.kind==='points'){\n        sel.forEach(d=>{ a.pts.forEach(km=>{ if(km>DATA[d].dist) return; const i=this.idxForKm(d,km); const p=DATA[d].route[i];\n          this.layers.push(L.circleMarker(p,{radius:7,color:'#fff',weight:2,fillColor:a.color,fillOpacity:1}).addTo(this.map).bindPopup('<b>'+a.label+' · km '+km+'<\u002Fb><br>'+a.desc)); }); });\n      } else if(a.kind==='heat'){\n        sel.filter(d=>HEAT[d]).forEach(d=>{ HEAT[d].forEach(pt=>{\n          this.layers.push(L.circleMarker([pt.lat,pt.lon],{radius:7,color:'#fff',weight:2,fillColor:a.color,fillOpacity:1}).addTo(this.map).bindPopup('<b>Mittagshitze · '+DATA[d].label+'<\u002Fb><br>'+pt.uhr+' Uhr · km '+pt.km+' · '+pt.temp+' °C')); }); });\n      } else if(a.kind==='rainzones'){\n        if(this.state.days[a.day]){ const d=a.day;\n          a.zones.forEach(z=>{ const i0=this.idxForKm(d,z.from),i1=this.idxForKm(d,z.to);\n            const seg=DATA[d].route.slice(i0,i1+1);\n            if(seg.length>1) this.layers.push(L.polyline(seg,{color:a.color,weight:9,opacity:.5,dashArray:'1,6',lineCap:'round'}).addTo(this.map).bindPopup('<b>'+a.label+' · '+z.lab+'<\u002Fb><br>'+a.desc)); });\n          this.layers.push(L.circleMarker(DATA[d].start,{radius:7,color:'#fff',weight:2,fillColor:a.color,fillOpacity:1}).addTo(this.map).bindPopup('<b>Regen · '+DATA[d].label+'<\u002Fb><br>'+a.desc)); }\n      }\n    });\n    if(refit && bounds) this.map.fitBounds(bounds,{padding:[30,30]});\n  }\n\n  drawElev(){\n    const {DATA,COLORS,HEAT,order,ANNOT}=window.VIERDAAGSE;\n    const cv=this._canvasEl; if(!cv) return;\n    const sel=order.filter(d=>this.state.days[d]);\n    if(!sel.length){ if(this.chart){ this.chart.destroy(); this.chart=null; } return; }\n    const dark=this.state.theme==='dark';\n    const txt=dark?'#a8a59a':'#6f6d64';\n    const grid=dark?'rgba(255,255,255,.08)':'rgba(0,0,0,.07)';\n    const fam=\"'Hanken Grotesk',sans-serif\";\n    const self=this;\n    const stateRef=this.state;\n    const datasets=sel.map(d=>({label:DATA[d].label,dayKey:d,data:DATA[d].elev.map(p=>({x:p[0],y:p[1]})),\n      borderColor:COLORS[d],backgroundColor:COLORS[d]+'18',borderWidth:2.4,pointRadius:0,fill:false,tension:.3}));\n    const annPlugin={id:'ann',afterDatasetsDraw(c){\n      const s2=order.filter(d=>self.state.days[d]); if(!s2.length) return;\n      const x=c.scales.x,ar=c.chartArea,ctx=c.ctx;\n      ANNOT.filter(a=>self.state.anns[a.id]).forEach(a=>{\n        ctx.save();\n        if(a.kind==='range'){\n          const xa=x.getPixelForValue(a.from),xb=x.getPixelForValue(a.to);\n          ctx.fillStyle=a.color+'22'; ctx.fillRect(xa,ar.top,xb-xa,ar.bottom-ar.top);\n          ctx.strokeStyle=a.color+'88'; ctx.setLineDash([4,3]);\n          ctx.beginPath();ctx.moveTo(xa,ar.top);ctx.lineTo(xa,ar.bottom);ctx.moveTo(xb,ar.top);ctx.lineTo(xb,ar.bottom);ctx.stroke();\n          ctx.setLineDash([]);ctx.fillStyle=a.color;ctx.font='600 11px '+fam;ctx.textAlign='center';\n          ctx.fillText(a.label.replace('km','').trim(),(xa+xb)/2,ar.top+12);\n        } else if(a.kind==='points'){\n          ctx.strokeStyle=a.color;ctx.fillStyle=a.color;ctx.font='600 10px '+fam;ctx.textAlign='center';ctx.setLineDash([3,3]);\n          a.pts.forEach(km=>{ const px=x.getPixelForValue(km); if(px<ar.left||px>ar.right) return;\n            ctx.beginPath();ctx.moveTo(px,ar.top+14);ctx.lineTo(px,ar.bottom);ctx.stroke();\n            ctx.beginPath();ctx.arc(px,ar.top+8,3,0,7);ctx.fill(); });\n          ctx.setLineDash([]);\n        } else if(a.kind==='heat'){\n          const kms=[]; s2.filter(d=>HEAT[d]).forEach(d=>HEAT[d].forEach(p=>kms.push(p.km)));\n          if(kms.length){ const lo=Math.min(...kms),hi=Math.max(...kms);\n            const xa=x.getPixelForValue(lo),xb=x.getPixelForValue(hi);\n            ctx.fillStyle=a.color+'1c';ctx.fillRect(xa,ar.top,xb-xa,ar.bottom-ar.top);\n            ctx.fillStyle=a.color;ctx.font='600 11px '+fam;ctx.textAlign='center';\n            ctx.fillText('11–13 Uhr',(xa+xb)/2,ar.bottom-6); }\n        } else if(a.kind==='rainzones'){\n          if(self.state.days[a.day]){ a.zones.forEach(z=>{ const xa=x.getPixelForValue(z.from),xb=x.getPixelForValue(z.to);\n            ctx.fillStyle=a.color+'22';ctx.fillRect(xa,ar.top,xb-xa,ar.bottom-ar.top);\n            ctx.strokeStyle=a.color+'99';ctx.setLineDash([2,4]);\n            ctx.beginPath();ctx.moveTo(xa,ar.top);ctx.lineTo(xa,ar.bottom);ctx.moveTo(xb,ar.top);ctx.lineTo(xb,ar.bottom);ctx.stroke();ctx.setLineDash([]);\n            ctx.fillStyle=a.color;ctx.font='600 10px '+fam;ctx.textAlign='center';\n            ctx.fillText(z.lab,(xa+xb)/2,ar.top+12); }); }\n        }\n        ctx.restore();\n      });\n    }};\n    if(this.chart) this.chart.destroy();\n    this.chart=new Chart(cv,{type:'line',data:{datasets},plugins:[annPlugin],\n      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'nearest',intersect:false},\n        plugins:{legend:{display:true,position:'top',labels:{boxWidth:14,boxHeight:4,color:txt,font:{size:12,family:fam}}},\n          tooltip:{callbacks:{title:i=>'km '+i[0].parsed.x.toFixed(1),label:i=>i.dataset.label+': '+i.parsed.y+' m'}}},\n        onHover:(ev,els)=>{ if(els.length){ const el=els[0],ds=self.chart.data.datasets[el.datasetIndex],pt=DATA[ds.dayKey].route[el.index];\n          if(pt){ if(!self.posM){ self.posM=L.circleMarker(pt,{radius:8,color:'#fff',weight:2,fillColor:ds.borderColor,fillOpacity:1}).addTo(self.map); } else { self.posM.setLatLng(pt); self.posM.setStyle({fillColor:ds.borderColor}); } } } },\n        scales:{x:{type:'linear',title:{display:true,text:'Distanz (km)',color:txt,font:{family:fam}},ticks:{maxTicksLimit:10,color:txt,font:{family:fam}},grid:{color:grid}},\n                y:{title:{display:true,text:'Höhe (m)',color:txt,font:{family:fam}},beginAtZero:true,ticks:{color:txt,font:{family:fam}},grid:{color:grid}}}}});\n  }\n\n  renderVals(){\n    const dark=this.state.theme==='dark';\n    const themeStyle = dark\n      ? '--bg:#161512;--surface:#211f1b;--ink:#f3f0e7;--muted:#a8a59a;--border:rgba(255,255,255,.16);--accent:#ff5436;--chip:#2a2823;--shadow:0 1px 2px rgba(0,0,0,.45),0 14px 34px rgba(0,0,0,.4)'\n      : '--bg:#f1efe9;--surface:#ffffff;--ink:#181712;--muted:#6f6d64;--border:rgba(20,18,12,.13);--accent:#ff3b1f;--chip:#ffffff;--shadow:0 1px 2px rgba(0,0,0,.05),0 10px 30px rgba(0,0,0,.05)';\n    const P = dark\n      ? {ink:'#f3f0e7',surface:'#211f1b',border:'rgba(255,255,255,.16)',muted:'#a8a59a'}\n      : {ink:'#181712',surface:'#ffffff',border:'rgba(20,18,12,.13)',muted:'#6f6d64'};\n    const toggleTheme=()=>{ this.setState(s=>{ const t=s.theme==='dark'?'light':'dark'; try{localStorage.setItem('vierdaagse-theme',t);}catch(e){} return {theme:t}; }); };\n    const knobStyle='transform:translateX('+(dark?'24px':'2px')+');transition:transform .28s cubic-bezier(.4,0,.2,1)';\n    const themeLabel = dark?'Dunkel':'Hell';\n\n    const base={ themeStyle, dark, toggleTheme, knobStyle, themeLabel,\n      setMapEl:this.setMapEl, setCanvasEl:this.setCanvasEl,\n      selAll:()=>this.selAll(), selNone:()=>this.selNone() };\n\n    const data=window.VIERDAAGSE;\n    if(!data){\n      return { ...base, dayTabs:[], annObs:[], annRec:[], tableRows:[], activeLayers:[],\n        hasSel:false, noSel:true, hasActive:false, stDays:'–', stDist:'–', stGain:'–', stTmax:'–' };\n    }\n    const {DATA,COLORS,RAINMM,order,ANNOT}=data;\n    const sel=order.filter(d=>this.state.days[d]);\n    const hasSel=sel.length>0;\n\n    const dayTabs=order.map(d=>{ const on=!!this.state.days[d]; const c=COLORS[d];\n      return { key:d, label:DATA[d].label, toggle:()=>this.toggleDay(d),\n        style:'display:flex;align-items:center;gap:9px;padding:9px 15px;border-radius:999px;cursor:pointer;font-size:14px;font-weight:'+(on?'700':'500')+';user-select:none;transition:all .15s;border:'+(on?('2px solid '+P.ink):('1.5px solid '+P.border))+';background:'+(on?P.surface:'transparent')+';color:'+(on?P.ink:P.muted)+';opacity:'+(on?'1':'.7'),\n        dotStyle:'width:13px;height:13px;border-radius:50%;flex:none;background:'+(on?c:'transparent')+';border:2px solid '+c };\n    });\n    const mkAnn=a=>{ const on=!!this.state.anns[a.id]; const sq=a.kind==='points';\n      return { id:a.id, label:a.label, toggle:()=>this.toggleAnn(a.id),\n        style:'display:flex;align-items:center;gap:8px;padding:7px 13px;border-radius:999px;cursor:pointer;font-size:13px;font-weight:'+(on?'700':'500')+';user-select:none;transition:all .15s;border:'+(on?('2px solid '+a.color):('1.5px solid '+P.border))+';background:'+(on?(a.color+'14'):'transparent')+';color:'+(on?P.ink:P.muted)+';opacity:'+(on?'1':'.72'),\n        dotStyle:'width:12px;height:12px;flex:none;border-radius:'+(sq?'3px':'50%')+';background:'+(on?a.color:'transparent')+';border:2px solid '+a.color };\n    };\n    const annObs=ANNOT.filter(a=>a.cat==='obs').map(mkAnn);\n    const annRec=ANNOT.filter(a=>a.cat==='rec').map(mkAnn);\n\n    const tableRows=sel.map(d=>{ const v=DATA[d];\n      return { key:d, label:v.label, dist:v.dist+' km', gain:v.gain+' m',\n        hrange:Math.round(v.emin)+' / '+Math.round(v.emax)+' m', tmax:v.tmax.toFixed(1)+' °C',\n        rain:RAINMM[d].toFixed(1)+(d==='2025-07-16'?' mm*':' mm'),\n        dotStyle:'width:11px;height:11px;border-radius:50%;flex:none;background:'+COLORS[d] };\n    });\n\n    const activeLayers=ANNOT.filter(a=>this.state.anns[a.id]).map(a=>({ key:a.id, label:a.label, desc:a.desc,\n      dotStyle:'width:10px;height:10px;border-radius:50%;flex:none;margin-top:5px;background:'+a.color }));\n\n    let dist=0,gain=0,tmax=-99;\n    sel.forEach(d=>{ const v=DATA[d]; dist+=v.dist; gain+=v.gain; if(v.tmax>tmax) tmax=v.tmax; });\n\n    return { ...base, dayTabs, annObs, annRec, tableRows, activeLayers,\n      hasSel, noSel:!hasSel, hasActive:activeLayers.length>0,\n      stDays:String(sel.length),\n      stDist:hasSel?(Math.round(dist*10)/10)+' km':'–',\n      stGain:hasSel?gain+' m':'–',\n      stTmax:hasSel?tmax.toFixed(1)+' °C':'–' };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
